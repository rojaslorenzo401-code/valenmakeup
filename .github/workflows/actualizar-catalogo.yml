name: Actualizar catalogo desde Cuanto

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-catalogo-cuanto
  cancel-in-progress: false

jobs:
  actualizar-catalogo:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Consultar catalogo de Cuanto
        run: node scripts/actualizar-productos.js

      - name: Guardar cambios solo si el catalogo cambio
        shell: bash
        run: |
          if git diff --quiet -- valenmakeupWeb/wwwroot/datos/productos.json; then
            echo "El catalogo no tuvo cambios."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add valenmakeupWeb/wwwroot/datos/productos.json
          git commit -m "Actualiza catalogo desde Cuanto"
          git push
